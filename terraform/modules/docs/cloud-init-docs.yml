#cloud-config
package_update: true
packages: [git, nginx]
runcmd:
  - git clone --branch ${repository_branch} ${repository_url} /opt/Sneakertail
  - mkdir -p /var/www/docs
  - |
    cat > /var/www/docs/index.html <<'EOF'
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>docs.sneakertail.online</title>
        <style>
          :root {
            --ink: #111;
            --muted: #707072;
            --paper: #fff;
            --soft: #f5f5f5;
            --line: #e5e5e5;
            font-family: Arial, "Helvetica Neue", sans-serif;
            color: var(--ink);
            background: var(--paper);
          }

          * { box-sizing: border-box; }
          body { margin: 0; min-width: 320px; }
          a { color: inherit; text-decoration: none; }

          .site-header {
            align-items: center;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 18px;
            justify-content: space-between;
            padding: 16px clamp(18px, 4vw, 54px);
            position: sticky;
            top: 0;
            z-index: 20;
          }

          .brand,
          .header-actions,
          .product-actions {
            align-items: center;
            display: flex;
          }

          .brand {
            gap: 12px;
            font-weight: 800;
          }

          .brand-mark {
            align-items: center;
            background: var(--ink);
            color: var(--paper);
            display: inline-flex;
            height: 38px;
            justify-content: center;
            width: 38px;
          }

          .header-actions {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 800;
            gap: 10px;
          }

          .pill {
            background: var(--soft);
            border-radius: 999px;
            padding: 12px 18px;
          }

          .hero {
            display: grid;
            gap: 28px;
            grid-template-columns: minmax(0, 0.9fr) minmax(340px, 1.1fr);
            padding: 32px clamp(18px, 4vw, 54px) 42px;
          }

          .eyebrow {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0;
            margin: 0;
            text-transform: uppercase;
          }

          h1 {
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            line-height: 0.96;
            margin: 12px 0 18px;
            max-width: 720px;
          }

          .hero-text {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 560px;
          }

          .hero-media {
            background: var(--soft);
            min-height: 460px;
            overflow: hidden;
          }

          .hero-media img {
            height: 100%;
            min-height: 460px;
            object-fit: cover;
            width: 100%;
          }

          .catalog-section {
            padding: 28px clamp(18px, 4vw, 54px) 64px;
          }

          .section-heading {
            align-items: end;
            display: flex;
            gap: 18px;
            justify-content: space-between;
            margin-bottom: 24px;
          }

          .section-heading h2 {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            margin: 6px 0 0;
          }

          .product-grid {
            display: grid;
            gap: 30px 18px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
          }

          .product-card {
            display: grid;
            gap: 12px;
          }

          .product-card img {
            aspect-ratio: 1;
            background: var(--soft);
            object-fit: cover;
            width: 100%;
          }

          .product-body {
            display: grid;
            gap: 7px;
          }

          .product-body span,
          .product-body p {
            color: var(--muted);
            margin: 0;
          }

          .product-body h3 {
            margin: 0;
          }

          .product-actions {
            gap: 14px;
            justify-content: space-between;
            margin-top: 8px;
          }

          .tag {
            align-items: center;
            background: var(--ink);
            border-radius: 999px;
            color: var(--paper);
            display: inline-flex;
            font-size: 0.82rem;
            font-weight: 900;
            min-height: 34px;
            padding: 0 14px;
            white-space: nowrap;
          }

          @media (max-width: 980px) {
            .hero,
            .product-grid {
              grid-template-columns: 1fr;
            }

            .hero-media,
            .hero-media img {
              min-height: 360px;
            }
          }

          @media (max-width: 620px) {
            .site-header {
              align-items: flex-start;
              flex-direction: column;
              padding: 14px 16px;
            }

            .header-actions {
              flex-wrap: wrap;
            }

            .hero,
            .catalog-section {
              padding-left: 16px;
              padding-right: 16px;
            }

            .section-heading {
              align-items: flex-start;
              flex-direction: column;
            }
          }
        </style>
      </head>
      <body>
        <header class="site-header">
          <a class="brand" href="/">
            <span class="brand-mark">ST</span>
            <span>docs.sneakertail.online</span>
          </a>
          <div class="header-actions">
            <span class="pill">Drop Guide</span>
            <span class="pill">Fit Notes</span>
          </div>
        </header>

        <main>
          <section class="hero">
            <div>
              <p class="eyebrow">Sneaker field notes</p>
              <h1>Know the pair before you wear the pair.</h1>
              <p class="hero-text">Quick reads on comfort, materials, sizing, and styling so every checkout feels less like a gamble and more like a clean pickup.</p>
            </div>
            <div class="hero-media">
              <img src="https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?auto=format&fit=crop&w=1400&q=80" alt="Sneakers lined up on display" />
            </div>
          </section>

          <section class="catalog-section">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Editor picks</p>
                <h2>Three pairs worth a closer look</h2>
              </div>
              <span class="tag">Fresh notes</span>
            </div>

            <div class="product-grid">
              <article class="product-card">
                <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=900&q=80" alt="Court Legacy Pro sneaker" />
                <div class="product-body">
                  <span>Adidas / Lifestyle</span>
                  <h3>Court Legacy Pro</h3>
                  <p>A low-profile court pair with a smooth leather upper, soft collar padding, and the kind of clean shape that works with denim, cargos, or track pants.</p>
                  <div class="product-actions">
                    <strong>$129.00</strong>
                    <span class="tag">True to size</span>
                  </div>
                </div>
              </article>

              <article class="product-card">
                <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=900&q=80" alt="Retro High 77 sneaker" />
                <div class="product-body">
                  <span>Converse / High Tops</span>
                  <h3>Retro High 77</h3>
                  <p>Old-school ankle coverage, textured canvas, and a flexible sole. Best for laid-back fits where the sneaker should look broken-in from day one.</p>
                  <div class="product-actions">
                    <strong>$99.00</strong>
                    <span class="tag">Size up half</span>
                  </div>
                </div>
              </article>

              <article class="product-card">
                <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=900&q=80" alt="Pulse Knit 90 sneaker" />
                <div class="product-body">
                  <span>New Balance / Running</span>
                  <h3>Pulse Knit 90</h3>
                  <p>Breathable knit, a locked-in heel, and responsive foam for people who end up walking way more than they planned.</p>
                  <div class="product-actions">
                    <strong>$119.00</strong>
                    <span class="tag">All-day comfort</span>
                  </div>
                </div>
              </article>
            </div>
          </section>
        </main>
      </body>
    </html>
    EOF
  - rm -f /etc/nginx/sites-enabled/default
  - |
    cat > /etc/nginx/sites-available/docs <<EOF
    server {
      listen 80 default_server;
      server_name _;
      root /var/www/docs;
      index index.html;

      location / {
        try_files \$uri \$uri/ /index.html;
      }
    }
    EOF
  - ln -sf /etc/nginx/sites-available/docs /etc/nginx/sites-enabled/docs
  - nginx -t
  - systemctl enable --now nginx
  - systemctl reload nginx
