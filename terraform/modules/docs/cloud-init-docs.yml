#cloud-config
package_update: true
packages: [git, nginx]
runcmd:
  - git clone --branch ${repository_branch} ${repository_url} /opt/Sneakertail
  - mkdir -p /var/www/docs
  - |
    cat > /var/www/docs/index.html <<'EOF'
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sneakertail Docs - Hostname Based Routing Demo</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; }
        header { background: #111; color: white; padding: 24px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 12px; }
        .subtitle { color: #707072; font-size: 1.1rem; margin-bottom: 40px; }
        .info-box { background: white; border-radius: 8px; padding: 24px; margin-bottom: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .info-box h2 { font-size: 1.5rem; margin-bottom: 12px; color: #111; }
        .info-box p { line-height: 1.6; margin-bottom: 12px; color: #707072; }
        .sneaker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 32px; }
        .sneaker-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .sneaker-card:hover { transform: translateY(-4px); }
        .sneaker-image { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; }
        .sneaker-info { padding: 16px; }
        .sneaker-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 6px; }
        .sneaker-brand { color: #707072; font-size: 0.9rem; margin-bottom: 8px; }
        .sneaker-price { font-weight: 800; color: #111; font-size: 1.2rem; }
        .routing-demo { background: #fff3cd; border-left: 4px solid #ffc107; padding: 16px; border-radius: 4px; margin-bottom: 24px; }
        .routing-demo p { color: #856404; margin: 0; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
      </style>
    </head>
    <body>
      <header>
        <h1>🎯 Sneakertail Docs</h1>
        <p>Hostname-Based Routing Demonstration</p>
      </header>
      
      <div class="container">
        <div class="routing-demo">
          <p><strong>📍 Location:</strong> This page is served from <code>docs.sneakertail.online</code></p>
          <p><strong>🔀 Routing Type:</strong> Hostname-based routing (future enhancement)</p>
          <p><strong>💡 Purpose:</strong> This subdomain demonstrates how hostname-based routing can be used for documentation, admin panels, or service-specific UIs</p>
        </div>

        <div class="info-box">
          <h2>What is Hostname-Based Routing?</h2>
          <p>Hostname-based routing allows you to route requests to different backend services based on the hostname in the HTTP request. For example:</p>
          <ul style="margin-left: 20px; line-height: 1.8;">
            <li><code>www.sneakertail.online</code> → Frontend Store</li>
            <li><code>catalog.sneakertail.online</code> → Catalog Service API</li>
            <li><code>cart.sneakertail.online</code> → Cart Service API</li>
            <li><code>docs.sneakertail.online</code> → Documentation (this page)</li>
          </ul>
        </div>

        <div class="info-box">
          <h2>Featured Sneakers Catalog</h2>
          <div class="sneaker-grid">
            <div class="sneaker-card">
              <div class="sneaker-image">👟</div>
              <div class="sneaker-info">
                <div class="sneaker-name">Air Stride Neo</div>
                <div class="sneaker-brand">Nike</div>
                <div class="sneaker-price">$149.00</div>
              </div>
            </div>
            <div class="sneaker-card">
              <div class="sneaker-image">👟</div>
              <div class="sneaker-info">
                <div class="sneaker-name">Court Legacy Pro</div>
                <div class="sneaker-brand">Adidas</div>
                <div class="sneaker-price">$129.00</div>
              </div>
            </div>
            <div class="sneaker-card">
              <div class="sneaker-image">👟</div>
              <div class="sneaker-info">
                <div class="sneaker-name">Retro High 77</div>
                <div class="sneaker-brand">Converse</div>
                <div class="sneaker-price">$99.00</div>
              </div>
            </div>
            <div class="sneaker-card">
              <div class="sneaker-image">👟</div>
              <div class="sneaker-info">
                <div class="sneaker-name">Pulse Knit 90</div>
                <div class="sneaker-brand">New Balance</div>
                <div class="sneaker-price">$119.00</div>
              </div>
            </div>
            <div class="sneaker-card">
              <div class="sneaker-image">👟</div>
              <div class="sneaker-info">
                <div class="sneaker-name">Foam Runner Lite</div>
                <div class="sneaker-brand">Yeezy</div>
                <div class="sneaker-price">$89.00</div>
              </div>
            </div>
          </div>
        </div>

        <div class="info-box">
          <h2>Architecture Overview</h2>
          <p><strong>Current Setup:</strong> Path-based routing using Application Gateway</p>
          <p><strong>Future Enhancement:</strong> Add hostname-based routing for:</p>
          <ul style="margin-left: 20px; line-height: 1.8;">
            <li>Service-specific APIs on dedicated subdomains</li>
            <li>Admin/Documentation panels on internal subdomains</li>
            <li>Multi-tenant support with tenant-specific subdomains</li>
            <li>A/B testing with canary deployment subdomains</li>
          </ul>
        </div>

        <div class="info-box">
          <h2>Network Configuration</h2>
          <p><strong>VNet:</strong> Docs VNet (10.3.0.0/16)</p>
          <p><strong>Subnet:</strong> Docs Subnet (10.3.1.0/24)</p>
          <p><strong>VM:</strong> Single Ubuntu VM running this documentation server</p>
          <p><strong>Access:</strong> Via public IP address (enable hostname-based routing to use custom domain)</p>
        </div>
      </div>
    </body>
    </html>
    EOF
  - rm -f /etc/nginx/sites-enabled/default
  - |
    cat > /etc/nginx/sites-available/docs <<EOF
    server {
      listen 80 default_server;
      server_name _;
      root /var/www/docs;
      index index.html;
      
      location / {
        try_files \$uri \$uri/ /index.html;
      }
    }
    EOF
  - ln -sf /etc/nginx/sites-available/docs /etc/nginx/sites-enabled/docs
  - nginx -t
  - systemctl enable --now nginx
  - systemctl reload nginx
