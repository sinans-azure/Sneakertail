apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: sneakertail
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: muhammedsinanust/sneakertail-catalog-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: sneakertail-config
                  key: NODE_ENV
            - name: PORT
              value: "4001"
            - name: DB_SSL
              valueFrom:
                configMapKeyRef:
                  name: sneakertail-config
                  key: DB_SSL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sneakertail-db
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
