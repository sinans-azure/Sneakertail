<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sneakertail.online</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="sneakertail.online home">
        <span class="brand-mark">ST</span>
        <span>sneakertail.online</span>
      </a>
      <nav class="desktop-nav" aria-label="Primary">
        <a href="#new">New</a>
        <a href="#catalog">Men</a>
        <a href="#catalog">Women</a>
        <a href="#catalog">Kids</a>
        <a href="#catalog">Sale</a>
      </nav>
      <div class="header-actions">
        <label class="search-pill">
          <span aria-hidden="true">Search</span>
          <input id="searchInput" type="search" placeholder="Search" />
        </label>
        <button class="icon-button" id="openCartButton" aria-label="Open cart">
          <span aria-hidden="true">Bag</span>
          <strong id="cartCount">0</strong>
        </button>
      </div>
    </header>

    <main>
      <section class="promo-strip" aria-label="Store promotion">
        <p>Free delivery on orders over $150</p>
        <a href="#catalog">Shop sneakers</a>
      </section>

      <section class="hero" id="new">
        <div class="hero-media">
          <div class="vertical-carousel" aria-label="Featured sneakers">
            <div class="vertical-track" id="featuredTrack"></div>
          </div>
          <div class="carousel-controls">
            <button id="previousFeatured" aria-label="Previous featured sneaker">&uarr;</button>
            <button id="nextFeatured" aria-label="Next featured sneaker">&darr;</button>
          </div>
        </div>
        <div class="hero-copy">
          <p>Just in</p>
          <h1>Step into the next rotation.</h1>
          <span>Street-ready pairs, clean checkout, cloud-native services behind the counter.</span>
          <div class="hero-actions">
            <a class="primary-link" href="#catalog">Shop</a>
            <button class="secondary-link" id="heroCartButton">View Bag</button>
          </div>
        </div>
      </section>

      <section class="category-section" aria-label="Shop by category">
        <div class="section-title">
          <h2>Shop by Sport</h2>
          <p id="notice" role="status"></p>
        </div>
        <div class="category-rail" id="categoryRail"></div>
      </section>

      <section class="catalog" id="catalog">
        <div class="catalog-heading">
          <div>
            <p>Sneakers</p>
            <h2 id="catalogTitle">All Shoes</h2>
          </div>
          <button class="filter-button" id="clearFiltersButton">Clear filters</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </section>
    </main>

    <button class="scrim" id="scrim" aria-label="Close cart"></button>
    <aside class="cart-drawer" id="cartDrawer" aria-labelledby="cartTitle" aria-hidden="true">
      <div class="cart-header">
        <div>
          <p>Bag</p>
          <h2 id="cartTitle">Your items</h2>
        </div>
        <button id="closeCartButton">Close</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <form class="checkout-panel" id="checkoutForm">
        <label>
          Email for checkout
          <input id="customerEmail" type="email" value="buyer@sneakertail.online" required />
        </label>
        <div class="total-row">
          <span>Total</span>
          <strong id="cartTotal">$0.00</strong>
        </div>
        <button type="submit" id="checkoutButton">Checkout</button>
      </form>
    </aside>

    <script src="/config.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
