name: Build and Push Docker Hub Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dockerhub-images.yml"
      - "package.json"
      - "package-lock.json"
      - "services/**"

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            image: sneakertail-frontend
            dockerfile: services/frontend/Dockerfile
          - service: catalog-service
            image: sneakertail-catalog-service
            dockerfile: services/catalog-service/Dockerfile
          - service: cart-order-service
            image: sneakertail-cart-order-service
            dockerfile: services/cart-order-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
